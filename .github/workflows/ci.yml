name: ci

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
        env:
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
