name: update-readme

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6h
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-readme.yml'

permissions:
  contents: write

jobs:
  refresh-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch recent issues authored by user
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          USER="hubtheocoelho"

          # Pull up to 10 most-recent issues opened by this user across GitHub.
          # repository_url looks like https://api.github.com/repos/owner/repo — strip the prefix.
          ISSUES=$(gh api -X GET search/issues \
            -f q="author:${USER} is:issue sort:created-desc" \
            -F per_page=10 \
            --jq '.items[] | "- [`" + (.repository_url | sub("https://api.github.com/repos/"; "")) + "#" + (.number|tostring) + "`](" + .html_url + ") — " + .title + " `" + .state + "`"' \
            || true)

          {
            echo "<!-- ISSUES:START -->"
            if [ -z "$ISSUES" ]; then
              echo "_nenhuma issue ainda — em breve._"
            else
              echo "$ISSUES"
            fi
            echo "<!-- ISSUES:END -->"
          } > /tmp/issues.md

          python3 - <<'PY'
          import pathlib, re
          readme = pathlib.Path("README.md").read_text()
          new_block = pathlib.Path("/tmp/issues.md").read_text().strip()
          updated = re.sub(
              r"<!-- ISSUES:START -->.*?<!-- ISSUES:END -->",
              new_block,
              readme,
              flags=re.DOTALL,
          )
          pathlib.Path("README.md").write_text(updated)
          PY

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git add README.md
            git commit -m "chore(readme): refresh recent issues"
            git push
          else
            echo "no changes."
          fi
